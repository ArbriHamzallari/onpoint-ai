services:
  postgres:
    image: postgres:15
    container_name: onpoint-db
    environment:
      POSTGRES_USER: onpoint
      POSTGRES_PASSWORD: onpoint123
      POSTGRES_DB: onpoint_db
    ports:
      - "5433:5432"
    volumes:
      - onpoint_pgdata:/var/lib/postgresql/data

  ai-service:
    build:
      context: ./ai-service
    container_name: onpoint-ai
    env_file:
      - ./ai-service/.env
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    ports:
      - "5200:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  onpoint_pgdata: